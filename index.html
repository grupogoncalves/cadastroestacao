<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle | FullCharge</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ywz6_yQYzvAhd3lMx3R4Q1UvniyBuBwx">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --primary: #00A86B; --accent: #007BFF; --bg: #F8FAFC; --white: #FFFFFF; --text: #1E293B; --border: #E2E8F0; }
        
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Tela de Login */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        .login-box img { max-width: 140px; margin-bottom: 20px; }
        .login-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #0f172a; }
        
        /* App Principal Lado a Lado */
        #main-app { display: grid; grid-template-columns: 460px 1fr; height: 100vh; width: 100vw; display: none; }
        
        /* Coluna da Esquerda (Painel de Dados) */
        #panel-left { background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .panel-header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; flex-shrink: 0; position: relative;}
        .logo-img { max-width: 120px; object-fit: contain; }
        .panel-title { font-size: 16px; font-weight: 800; margin: 8px 0 2px; }
        .btn-logout { position: absolute; right: 15px; top: 20px; background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 5px 10px; border-radius: 6px; font-weight: 600; font-size: 11px; cursor: pointer; }
        
        /* Área de Rolagem do Formulário e da Lista */
        .scroll-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 25px; background: #fafafa; }
        
        .section-box { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin: 0 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; box-sizing: border-box; width: 100%; }
        input:focus, select:focus { border-color: var(--accent); }
        
        .search-geo-container { display: flex; gap: 8px; }
        .btn-search-geo { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 15px; transition: 0.2s; }
        .btn-submit:hover { background: #008f5a; }
        .btn-cancel-edit { background: #e2e8f0; color: var(--text); border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 8px; display: none; }
        
        /* Lista de Usinas Cadastradas */
        .station-item { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 13px; }
        .station-info { flex: 1; }
        .station-info strong { display: block; color: #0f172a; }
        .station-info small { color: #64748b; font-size: 11px; }
        .station-actions { display: flex; gap: 6px; }
        .btn-edit { background: #EFF6FF; color: var(--accent); border: 1px solid #BFDBFE; padding: 5px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-edit:hover { background: #DBEAFE; }
        .btn-delete { background: #FEF2F2; color: #ef4444; border: 1px solid #FEE2E2; padding: 5px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-delete:hover { background: #FEE2E2; }

        /* Coluna da Direita (Mapa Completo) */
        #map-cadastro { height: 100vh; width: 100%; z-index: 1; }
        .custom-div-icon { background: transparent; border: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://lh3.googleusercontent.com/d/1VFKoeTjJ3R6MBjqf9Q0fkwcnV8cJTS-U" alt="FullCharge">
        <h2>Painel Administrativo</h2>
        <form onsubmit="verificarLoginFirebase(event)" style="display: flex; flex-direction: column; gap: 12px;">
            <div style="text-align: left;">
                <label style="font-size: 10px; margin-bottom: 3px; display: block;">E-mail do Usuário</label>
                <input type="email" id="loginUser" placeholder="Ex: admin@fullcharge.com" required>
            </div>
            <div style="text-align: left;">
                <label style="font-size: 10px; margin-bottom: 3px; display: block;">Senha</label>
                <input type="password" id="loginPass" placeholder="Sua senha secreta" required>
            </div>
            <button type="submit" class="btn-submit" id="btn-login-text" style="margin-top: 5px;">🔓 Entrar</button>
        </form>
    </div>
</div>

<div id="main-app">
    <div id="panel-left">
        <div class="panel-header">
            <img src="https://lh3.googleusercontent.com/d/1VFKoeTjJ3R6MBjqf9Q0fkwcnV8cJTS-U" class="logo-img" alt="FullCharge">
            <div class="panel-title">Controle de Estações</div>
            <button class="btn-logout" onclick="fazerLogoutFirebase()">Sair</button>
        </div>
        
        <div class="scroll-content">
            <div class="section-box">
                <div class="section-title" id="form-section-title">Cadastrar Nova Estação</div>
                <form id="cadastroForm" onsubmit="salvarEstacao(event)">
                    <input type="hidden" id="editStationId" value="">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Nome da Estação</label>
                            <input type="text" id="nomeEstacao" placeholder="Ex: Posto Central - 150kW" required>
                        </div>
                        <div class="form-group">
                            <label>Município / UF</label>
                            <input type="text" id="municipioEstacao" placeholder="Ex: Joinville - SC" required>
                        </div>
                        <div class="form-group">
                            <label>Potência (Trafo)</label>
                            <input type="text" id="potenciaEstacao" placeholder="Ex: 75 kVA">
                        </div>
                        <div class="form-group">
                            <label>Status Inicial</label>
                            <select id="statusEstacao">
                                <option value="Disponível">🔵 Disponível</option>
                                <option value="Vendida">🟢 Vendida</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label style="color: #ef4444;">Senha de Liberação da Estação (Para o Mapa)</label>
                            <input type="text" id="senhaEstacao" placeholder="Senha para liberar ações no mapa" required style="border-color: #fca5a5;">
                        </div>
                        <div class="form-group full-width" style="margin-top: 5px;">
                            <label>Buscar Localização por Texto</label>
                            <div class="search-geo-container">
                                <input type="text" id="searchGeoInput" placeholder="Rua, cidade ou estabelecimento...">
                                <button type="button" class="btn-search-geo" onclick="buscarEndereco()">Buscar</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Latitude</label>
                            <input type="text" id="latEstacao" required onchange="atualizarMapaPorInputs()">
                        </div>
                        <div class="form-group">
                            <label>Longitude</label>
                            <input type="text" id="lngEstacao" required onchange="atualizarMapaPorInputs()">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-submit-text">💾 Salvar</button>
                    <button type="button" class="btn-cancel-edit" id="btn-cancel-edit" onclick="cancelarEdicao()">Cancelar Edição</button>
                </form>
            </div>
            
            <div class="section-box">
                <div class="section-title">Usinas Cadastradas em Lista</div>
                <div id="gerenciadorListaUsinas">
                    <div style="text-align: center; color: #64748b; font-size: 12px; padding: 10px;">Carregando dados...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="map-cadastro"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDxjgpzMCz36d4g5q-WNnPONRT9sw99tUE",
        authDomain: "estac-3a649.firebaseapp.com",
        databaseURL: "https://estac-3a649-default-rtdb.firebaseio.com",
        projectId: "estac-3a649",
        storageBucket: "estac-3a649.firebasestorage.app",
        messagingSenderId: "937644205362",
        appId: "1:937644205362:web:4a109f2330eb826903e32b"
    };

    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    const auth = firebase.auth();

    let map, marker = null;
    let listaEstacoesLocais = [];
    const defaultCoords = [-23.5505, -46.6333];

    const greenIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="background-color: #00A86B; width: 28px; height: 28px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.5);"></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14]
    });

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            setTimeout(() => { map.invalidateSize(); }, 200);
        } else {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    function verificarLoginFirebase(event) {
        event.preventDefault();
        const email = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        
        const btnText = document.getElementById('btn-login-text');
        btnText.innerText = "⏳ Verificando...";
        btnText.disabled = true;

        auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                btnText.innerText = "🔓 Entrar";
                btnText.disabled = false;
            })
            .catch((error) => {
                btnText.innerText = "🔓 Entrar";
                btnText.disabled = false;
                console.error(error);
                alert("Acesso negado! Verifique as credenciais.");
            });
    }

    function fazerLogoutFirebase() {
        auth.signOut().then(() => {
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        map = L.map('map-cadastro').setView(defaultCoords, 11);
        
        // MODIFICADO: lyrs=y ativa o Satélite do Google Maps com nomes de ruas e estabelecimentos comerciais comerciais
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps',
            maxZoom: 22
        }).addTo(map);

        redefinirMarcadorNoMapa(defaultCoords[0], defaultCoords[1]);

        map.on('click', function(e) {
            redefinirMarcadorNoMapa(e.latlng.lat, e.latlng.lng);
            document.getElementById('latEstacao').value = e.latlng.lat.toFixed(7);
            document.getElementById('lngEstacao').value = e.latlng.lng.toFixed(7);
        });

        ouvirEstacoesNoFirebase();
    });

    function redefinirMarcadorNoMapa(lat, lng) {
        if (marker) {
            map.removeLayer(marker);
        }
        marker = L.marker([lat, lng], { icon: greenIcon, draggable: true }).addTo(map);

        marker.on('dragend', function () {
            const position = marker.getLatLng();
            document.getElementById('latEstacao').value = position.lat.toFixed(7);
            document.getElementById('lngEstacao').value = position.lng.toFixed(7);
        });
    }

    function ouvirEstacoesNoFirebase() {
        rtdb.ref('estacoes').on('value', (snapshot) => {
            listaEstacoesLocais = [];
            const dados = snapshot.val();
            if (dados) {
                Object.keys(dados).forEach(key => {
                    if (dados[key]) {
                        listaEstacoesLocais.push({ ...dados[key], id: key.toString() });
                    }
                });
            }
            listaEstacoesLocais.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
            renderizarListaGerencial();
        });
    }

    function renderizarListaGerencial() {
        const container = document.getElementById('gerenciadorListaUsinas');
        if (listaEstacoesLocais.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #64748b; font-size: 12px; padding: 10px;">Nenhuma usina encontrada.</div>';
            return;
        }

        container.innerHTML = '';
        listaEstacoesLocais.forEach((st) => {
            const statusLabel = (st.status || st.Status || "Disponível");
            const senhaExibida = (st.senha || st.senha_incluir || st["senha incluir"] || st["Senha Incluir"] || "Sem senha");
            
            const item = document.createElement('div');
            item.className = 'station-item';
            item.innerHTML = `
                <div class="station-info">
                    <strong>${st.name}</strong>
                    <small>${st.municipio || 'Não informado'} | Trafo: ${st.potencia || '-'} | (${statusLabel})</small>
                    <small style="color: #ef4444; font-weight: 600; display: block; margin-top: 2px;">🔑 Senha cadastrada: ${senhaExibida}</small>
                </div>
                <div class="station-actions">
                    <button class="btn-edit" onclick="prepararEdicao('${st.id}')">Editar</button>
                    <button class="btn-delete" onclick="excluirEstacao('${st.id}', '${st.name}')">Excluir</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    async function buscarEndereco() {
        const query = document.getElementById('searchGeoInput').value;
        if (!query) return alert("Digite um termo de busca.");

        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await response.json();

            if (data && data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);

                document.getElementById('latEstacao').value = lat.toFixed(7);
                document.getElementById('lngEstacao').value = lon.toFixed(7);

                redefinirMarcadorNoMapa(lat, lon);
                map.invalidateSize();
                map.flyTo([lat, lon], 17);
            } else {
                alert("Nenhum local encontrado.");
            }
        } catch (error) {
            alert("Erro ao consultar serviço de mapas.");
        }
    }

    function atualizarMapaPorInputs() {
        const latRaw = document.getElementById('latEstacao').value.replace(',', '.');
        const lngRaw = document.getElementById('lngEstacao').value.replace(',', '.');
        const lat = parseFloat(latRaw);
        const lng = parseFloat(lngRaw);
        
        if (!isNaN(lat) && !isNaN(lng)) {
            redefinirMarcadorNoMapa(lat, lng);
            map.flyTo([lat, lng], 17);
        }
    }

    function prepararEdicao(id) {
        const estacao = listaEstacoesLocais.find(item => item.id.toString() === id.toString());
        if (!estacao) {
            alert("Erro: Não foi possível mapear esta usina.");
            return;
        }

        document.getElementById('cadastroForm').reset();

        document.getElementById('editStationId').value = estacao.id;
        document.getElementById('nomeEstacao').value = estacao.name || '';
        document.getElementById('municipioEstacao').value = estacao.municipio || '';
        document.getElementById('potenciaEstacao').value = estacao.potencia || estacao.Potencia || '';
        document.getElementById('statusEstacao').value = estacao.status || estacao.Status || 'Disponível';
        
        const senhaLimpa = (estacao.senha || estacao.senha_incluir || estacao["senha incluir"] || estacao["Senha Incluir"] || "").toString().trim();
        document.getElementById('senhaEstacao').value = senhaLimpa;
        
        document.getElementById('latEstacao').value = estacao.lat || estacao.latitude || '';
        document.getElementById('lngEstacao').value = estacao.lng || estacao.longitude || '';

        document.getElementById('form-section-title').innerText = "✍️ Editando: " + estacao.name;
        document.getElementById('btn-submit-text').innerText = "🔄 Atualizar Dados";
        document.getElementById('btn-cancel-edit').style.display = 'block';

        const latRaw = (estacao.lat || estacao.latitude || "").toString().replace(',', '.');
        const lngRaw = (estacao.lng || estacao.longitude || "").toString().replace(',', '.');
        const lat = parseFloat(latRaw);
        const lng = parseFloat(lngRaw);

        if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
            redefinirMarcadorNoMapa(lat, lng);
            map.invalidateSize(); 
            map.flyTo([lat, lng], 17);
        } else {
            const termoBusca = `${estacao.name}, ${estacao.municipio || ''}`;
            document.getElementById('searchGeoInput').value = termoBusca;
            buscarEndereco();
        }
    }

    function cancelarEdicao() {
        document.getElementById('cadastroForm').reset();
        document.getElementById('editStationId').value = '';
        document.getElementById('form-section-title').innerText = "Cadastrar Nova Estação";
        document.getElementById('btn-submit-text').innerText = "💾 Salvar";
        document.getElementById('btn-cancel-edit').style.display = 'none';
        redefinirMarcadorNoMapa(defaultCoords[0], defaultCoords[1]);
        map.setView(defaultCoords, 11);
    }

    async function excluirEstacao(id, nome) {
        if (confirm(`Deseja apagar permanentemente a usina "${nome}"?`)) {
            try {
                await rtdb.ref(`estacoes/${id}`).remove();
                alert("Estação excluída com sucesso.");
                if (document.getElementById('editStationId').value === id) {
                    cancelarEdicao();
                }
            } catch (error) {
                alert("Erro ao excluir registro.");
            }
        }
    }

    async function salvarEstacao(event) {
        event.preventDefault();

        const id = document.getElementById('editStationId').value;
        const nome = document.getElementById('nomeEstacao').value.trim();
        const municipio = document.getElementById('municipioEstacao').value.trim();
        const potencia = document.getElementById('potenciaEstacao').value.trim();
        const status = document.getElementById('statusEstacao').value;
        const senha = document.getElementById('senhaEstacao').value.trim().toString();
        
        const lat = document.getElementById('latEstacao').value.trim().replace(',', '.');
        const lng = document.getElementById('lngEstacao').value.trim().replace(',', '.');

        const dadosEstacao = {
            name: nome,
            municipio: municipio,
            potencia: potencia,
            Potencia: potencia,
            status: status,
            Status: status, 
            senha: senha,
            Senha: senha,
            senha_incluir: senha,
            "senha incluir": senha,
            "Senha Incluir": senha,
            lat: lat,
            lng: lng
        };

        try {
            if (id && id.trim() !== "") {
                await rtdb.ref(`estacoes/${id}`).update(dadosEstacao);
                alert(`Estação "${nome}" atualizada com sucesso!`);
                cancelarEdicao();
            } else {
                const novaRef = rtdb.ref('estacoes').push();
                await novaRef.set(dadosEstacao);
                alert(`Estação "${nome}" cadastrada com sucesso!`);
                cancelarEdicao();
            }
        } catch (error) {
            console.error(error);
            alert("Erro ao salvar os dados.");
        }
    }
</script>
</body>
</html>
